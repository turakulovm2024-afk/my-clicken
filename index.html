<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Мировой Кликер </title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 20% 30%, #34495e, #1a252f);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            overflow-x: hidden;
            position: relative;
            padding: 12px;
            padding-bottom: 70px;
        }
        #score-board {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: clamp(40px, 15vw, 80px);
            font-weight: bold;
            text-shadow: 0 6px 12px rgba(0,0,0,0.4);
            z-index: 5;
            pointer-events: none;
        }
        #click-button {
            width: min(75vw, 75vh, 300px);
            height: min(75vw, 75vh, 300px);
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle at 30% 30%, #ffe066, #f39c12);
            box-shadow: 0 12px 0 #b85e00, 0 20px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            font-weight: bold;
            font-size: min(10vw, 48px);
            color: white;
            text-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.05s ease;
            position: relative;
            z-index: 5;
            outline: none;
            user-select: none;
            touch-action: manipulation;
            margin-top: 5vh;
            margin-bottom: 20px;
        }
        #click-button:active {
            transform: scale(0.94);
            box-shadow: 0 6px 0 #b85e00, 0 12px 20px rgba(0,0,0,0.3);
        }

        /* ЛИДЕРБОРД СНИЗУ, РАСКРЫВАЕТСЯ ВНИЗ */
        #leaderboard {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            background: rgba(10, 15, 25, 0.9);
            backdrop-filter: blur(8px);
            color: white;
            border-radius: 20px 20px 0 0;
            z-index: 20;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,215,0,0.3);
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        #leaderboard.collapsed {
            max-height: 55px;
        }
        #leaderboard:not(.collapsed) {
            max-height: 45vh;
        }
        #leader-header {
            padding: 14px 18px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        #leader-header span {
            font-size: 24px;
            transition: transform 0.3s;
        }
        #leaderboard.collapsed #leader-header span {
            transform: rotate(180deg);
        }
        #leader-list {
            padding: 10px 18px 15px;
            max-height: calc(45vh - 55px);
            overflow-y: auto;
        }
        .entry {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 16px;
            padding: 3px 0;
        }
        .entry span {
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .entry b {
            color: #ffd966;
            font-size: 18px;
        }

        #change-player {
            position: fixed;
            left: 12px;
            top: 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            z-index: 15;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        @media (max-width: 480px) {
            #change-player {
                padding: 8px 14px;
                font-size: 14px;
            }
            .entry {
                font-size: 15px;
            }
            #leaderboard:not(.collapsed) {
                max-height: 40vh;
            }
            #leader-list {
                max-height: calc(40vh - 55px);
            }
        }

        #warning-msg {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(231, 76, 60, 0.9);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            backdrop-filter: blur(4px);
            z-index: 200;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }
        #bot-warning {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #c0392b;
            color: white;
            padding: 30px 50px;
            border-radius: 60px;
            font-size: 32px;
            font-weight: bold;
            z-index: 300;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
            border: 4px solid #e74c3c;
            text-align: center;
            display: none;
            white-space: nowrap;
        }
        #name-error {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: #e67e22;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 150;
            display: none;
        }
        .particle {
            position: fixed;
            pointer-events: none;
            width: 50px;
            height: 50px;
            z-index: 100;
            animation: fly 0.6s ease-out forwards;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.3));
            will-change: transform, opacity;
        }
        @keyframes fly {
            0% { opacity: 1; transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(var(--x), var(--y)) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="score-board">
        <span id="count">0</span>
    </div>

    <div id="leaderboard" class="collapsed">
        <div id="leader-header">
            🏆 Все игроки
            <span>▼</span>
        </div>
        <div id="leader-list">Загрузка...</div>
    </div>

    <button id="change-player">🔄 игрок</button>

    <button id="click-button">КЛИК!</button>

    <div id="warning-msg">⚠️ Слишком быстро!</div>
    <div id="bot-warning">🤖 БОТ ОБНАРУЖЕН!<br>Счёт обнулён!</div>
    <div id="name-error">❌ Имя занято!</div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue, update, increment, set, get, remove } from "firebase/database";

        const firebaseConfig = {
            databaseURL: "https://mygame-b11bf-default-rtdb.firebaseio.com/"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let playerName = localStorage.getItem('clickerName');
        let score = 0;
        const countDisplay = document.getElementById('count');
        const leaderList = document.getElementById('leader-list');
        const clickBtn = document.getElementById('click-button');
        const warningMsg = document.getElementById('warning-msg');
        const botWarning = document.getElementById('bot-warning');
        const nameError = document.getElementById('name-error');

        // Античит
        const ANTI = {
            MIN_INTERVAL_MS: 60,
            MAX_UNIFORM: 8,
            TOLERANCE: 12,
            HUMAN_VAR: 4,
            TOUCH_LIMIT: 2
        };
        let lastClick = 0, suspicious = 0, intervals = [], botDetected = false, warnTimer;

        function isBot() {
            return navigator.webdriver || window.outerWidth === 0 || window.outerHeight === 0 || !navigator.languages.length;
        }

        async function punishBot() {
            if (botDetected) return;
            botDetected = true;
            botWarning.style.display = 'block';
            setTimeout(() => botWarning.style.display = 'none', 3000);
            score = 0;
            countDisplay.innerText = '0';
            await set(ref(db, 'users/' + playerName), { score: 0 });
            lastClick = 0; suspicious = 0; intervals = [];
        }

        function showWarning(text) {
            if (warnTimer) clearTimeout(warnTimer);
            warningMsg.textContent = text || '⚠️ Слишком быстро!';
            warningMsg.style.opacity = '1';
            warnTimer = setTimeout(() => warningMsg.style.opacity = '0', 1000);
        }

        function showNameError() {
            nameError.style.display = 'block';
            setTimeout(() => nameError.style.display = 'none', 2000);
        }

        function isAutoclicker(now, touches = 1) {
            if (botDetected || isBot()) { punishBot(); return true; }
            if (lastClick === 0) { lastClick = now; return false; }

            const int = now - lastClick;
            let block = false;

            if (int < ANTI.MIN_INTERVAL_MS) {
                suspicious += 2; block = true;
            } else {
                intervals.push(int);
                if (intervals.length > ANTI.MAX_UNIFORM) intervals.shift();
                if (intervals.length >= ANTI.MAX_UNIFORM) {
                    const avg = intervals.reduce((a,b) => a+b, 0) / intervals.length;
                    const uniform = intervals.every(i => Math.abs(i - avg) <= ANTI.TOLERANCE);
                    const varied = intervals.some((v,i,a) => i>0 && Math.abs(v - a[i-1]) >= ANTI.HUMAN_VAR);
                    if (uniform && !varied) { suspicious += 3; block = true; }
                    else suspicious = Math.max(0, suspicious - 1);
                }
            }
            if (touches > ANTI.TOUCH_LIMIT) { suspicious += 1; block = true; }

            if (block) {
                showWarning();
                if (suspicious > 20) punishBot();
                return true;
            } else {
                lastClick = now;
                return false;
            }
        }

        // Лидерборд
        const lb = document.getElementById('leaderboard');
        document.getElementById('leader-header').addEventListener('click', (e) => {
            e.stopPropagation();
            lb.classList.toggle('collapsed');
        });

        // Смена имени с удалением старого аккаунта
        async function askNewName() {
            const newName = prompt("Новый ник:", playerName || "Игрок_"+Math.floor(Math.random()*1000));
            if (!newName) return;
            
            const snap = await get(ref(db, 'users/' + newName));
            if (snap.exists()) { showNameError(); return; }
            
            const oldName = playerName;
            const oldScore = score;
            
            // Создаём запись с новым именем и текущим счётом
            await set(ref(db, 'users/' + newName), { score: oldScore });
            
            // Удаляем старую запись
            if (oldName) {
                await remove(ref(db, 'users/' + oldName));
            }
            
            playerName = newName;
            localStorage.setItem('clickerName', playerName);
            
            // Переподключаем слушатель для синхронизации с новым именем
            setupSync();
        }

        function setupSync() {
            const myRef = ref(db, 'users/' + playerName);
            onValue(myRef, (snap) => {
                const val = snap.val();
                score = (val && typeof val.score === 'number') ? val.score : 0;
                countDisplay.innerText = score;
                if (!val) set(myRef, { score: 0 });
            });
        }

        (async () => {
            if (!playerName) {
                let cand = "Игрок_"+Math.floor(Math.random()*1000);
                while ((await get(ref(db, 'users/' + cand))).exists()) {
                    cand = "Игрок_"+Math.floor(Math.random()*1000);
                }
                playerName = cand;
                localStorage.setItem('clickerName', playerName);
            }
            setupSync();
        })();

        document.getElementById('change-player').addEventListener('click', askNewName);

        function handleClick(x, y, touches = 1) {
            if (isAutoclicker(performance.now(), touches)) return;
            score++;
            countDisplay.innerText = score;
            update(ref(db, 'users/' + playerName), { score: increment(1) }).catch(console.warn);
            createParticle(x, y);
        }

        clickBtn.addEventListener('click', (e) => {
            if (e.pointerType === 'touch') return;
            handleClick(e.clientX, e.clientY, 1);
        });
        clickBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            if (t) handleClick(t.clientX, t.clientY, e.touches.length);
        }, { passive: false });
        clickBtn.addEventListener('contextmenu', e => e.preventDefault());

        // Все игроки
        onValue(ref(db, 'users'), (snap) => {
            const data = snap.val();
            if (!data) { leaderList.innerHTML = '<div class="entry">Пусто</div>'; return; }
            const sorted = Object.entries(data)
                .map(([n, v]) => ({ name: n, score: v.score || 0 }))
                .sort((a,b) => b.score - a.score);
            leaderList.innerHTML = sorted.map(u => 
                `<div class="entry"><span>${escapeHTML(u.name)}</span><b>${u.score}</b></div>`
            ).join('');
        });

        function escapeHTML(s) {
            return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);
        }

        function createParticle(x, y) {
            const p = document.createElement('img');
            p.src = 'https://abrakadabra.fun/uploads/posts/2021-12/1640762606_1-abrakadabra-fun-p-monetka-na-prozrachnom-fone-1.png';
            p.className = 'particle';
            const dx = (Math.random() - 0.5) * 250;
            const dy = (Math.random() - 0.5) * 250 - 50;
            p.style.left = (x - 25) + 'px';
            p.style.top  = (y - 25) + 'px';
            p.style.setProperty('--x', dx + 'px');
            p.style.setProperty('--y', dy + 'px');
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }

        window.makeClick = (e) => { if(e) handleClick(e.clientX, e.clientY); };
    </script>
</body>
</html>
