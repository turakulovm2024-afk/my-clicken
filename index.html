<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Мировой Кликер 👤</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 20% 30%, #34495e, #1a252f);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            overflow-x: hidden;
            position: relative;
            padding: 12px;
            padding-bottom: 70px;
        }
        #score-board {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: clamp(40px, 15vw, 80px);
            font-weight: bold;
            text-shadow: 0 6px 12px rgba(0,0,0,0.4);
            z-index: 5;
            pointer-events: none;
        }
        #click-button {
            width: min(75vw, 75vh, 300px);
            height: min(75vw, 75vh, 300px);
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle at 30% 30%, #ffe066, #f39c12);
            box-shadow: 0 12px 0 #b85e00, 0 20px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            font-weight: bold;
            font-size: min(10vw, 48px);
            color: white;
            text-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.05s ease;
            position: relative;
            z-index: 5;
            outline: none;
            user-select: none;
            touch-action: manipulation;
            margin-top: 5vh;
            margin-bottom: 20px;
        }
        #click-button:active {
            transform: scale(0.94);
            box-shadow: 0 6px 0 #b85e00, 0 12px 20px rgba(0,0,0,0.3);
        }

        /* ЛИДЕРБОРД СНИЗУ */
        #leaderboard {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            background: rgba(10, 15, 25, 0.9);
            backdrop-filter: blur(8px);
            color: white;
            border-radius: 20px 20px 0 0;
            z-index: 20;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,215,0,0.3);
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        #leaderboard.collapsed {
            max-height: 55px;
        }
        #leaderboard:not(.collapsed) {
            max-height: 45vh;
        }
        #leader-header {
            padding: 14px 18px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        #leader-header span {
            font-size: 24px;
            transition: transform 0.3s;
        }
        #leaderboard.collapsed #leader-header span {
            transform: rotate(180deg);
        }
        #leader-list {
            padding: 10px 18px 15px;
            max-height: calc(45vh - 55px);
            overflow-y: auto;
        }
        .entry {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 16px;
            padding: 3px 0;
        }
        .entry span {
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .entry b {
            color: #ffd966;
            font-size: 18px;
        }

        /* Кнопка профиля */
        #profile-btn {
            position: fixed;
            left: 12px;
            top: 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            z-index: 15;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Панель профиля */
        #profile-panel {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #profile-card {
            background: #1e2a3a;
            border-radius: 30px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #f1c40f;
            text-align: center;
        }
        #profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #f1c40f;
            margin: 0 auto 15px;
            background: #2c3e50;
        }
        #profile-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #profile-stats {
            text-align: left;
            margin: 15px 0;
            background: #2c3e50;
            padding: 15px;
            border-radius: 20px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        #profile-close {
            margin-top: 15px;
            background: #e67e22;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
        }
        #change-avatar-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            margin: 10px 0;
            cursor: pointer;
        }
        #avatar-file-input {
            display: none;
        }

        @media (max-width: 480px) {
            #profile-btn {
                padding: 8px 14px;
                font-size: 14px;
            }
            .entry {
                font-size: 15px;
            }
            #leaderboard:not(.collapsed) {
                max-height: 40vh;
            }
            #leader-list {
                max-height: calc(40vh - 55px);
            }
        }

        .particle {
            position: fixed;
            pointer-events: none;
            width: 50px;
            height: 50px;
            z-index: 100;
            animation: fly 0.6s ease-out forwards;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.3));
            will-change: transform, opacity;
        }
        @keyframes fly {
            0% { opacity: 1; transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(var(--x), var(--y)) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="score-board">
        <span id="count">0</span>
    </div>

    <div id="leaderboard" class="collapsed">
        <div id="leader-header">
            🏆 Все игроки
            <span>▼</span>
        </div>
        <div id="leader-list">Загрузка...</div>
    </div>

    <button id="profile-btn">👤 Профиль</button>

    <button id="click-button">КЛИК!</button>

    <!-- Панель профиля -->
    <div id="profile-panel">
        <div id="profile-card">
            <img id="profile-avatar" src="https://abrakadabra.fun/uploads/posts/2021-12/1640762606_1-abrakadabra-fun-p-monetka-na-prozrachnom-fone-1.png" alt="Аватар">
            <div id="profile-name">Игрок</div>
            <button id="change-avatar-btn">📷 Загрузить аватар</button>
            <input type="file" id="avatar-file-input" accept="image/*">
            <div id="profile-stats">
                <div class="stat-row"><span>Всего кликов:</span> <span id="total-clicks">0</span></div>
                <div class="stat-row"><span>Текущий счёт:</span> <span id="current-score">0</span></div>
                <div class="stat-row"><span>Дата регистрации:</span> <span id="join-date">-</span></div>
            </div>
            <button id="change-name-btn" style="background: #9b59b6; margin-bottom: 10px;">✏️ Сменить ник</button>
            <button id="profile-close">Закрыть</button>
        </div>
    </div>

    <div id="name-error" style="position:fixed; bottom:120px; left:50%; transform:translateX(-50%); background:#e67e22; color:white; padding:10px 20px; border-radius:30px; z-index:150; display:none;">❌ Имя занято!</div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, onValue, update, increment, set, get, remove } from "firebase/database";

        const firebaseConfig = {
            databaseURL: "https://mygame-b11bf-default-rtdb.firebaseio.com/"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let playerName = localStorage.getItem('clickerName');
        let score = 0;
        let totalClicks = 0;
        let joinDate = '';
        let avatarBase64 = '';

        const countDisplay = document.getElementById('count');
        const leaderList = document.getElementById('leader-list');
        const clickBtn = document.getElementById('click-button');
        const nameError = document.getElementById('name-error');
        
        // Профиль
        const profileBtn = document.getElementById('profile-btn');
        const profilePanel = document.getElementById('profile-panel');
        const profileAvatar = document.getElementById('profile-avatar');
        const profileName = document.getElementById('profile-name');
        const totalClicksSpan = document.getElementById('total-clicks');
        const currentScoreSpan = document.getElementById('current-score');
        const joinDateSpan = document.getElementById('join-date');
        const changeNameBtn = document.getElementById('change-name-btn');
        const changeAvatarBtn = document.getElementById('change-avatar-btn');
        const avatarFileInput = document.getElementById('avatar-file-input');
        const profileClose = document.getElementById('profile-close');

        // === ЛИДЕРБОРД ===
        const lb = document.getElementById('leaderboard');
        document.getElementById('leader-header').addEventListener('click', (e) => {
            e.stopPropagation();
            lb.classList.toggle('collapsed');
        });

        // === ПРОФИЛЬ ===
        profileBtn.addEventListener('click', () => {
            updateProfileUI();
            profilePanel.style.display = 'flex';
        });
        profileClose.addEventListener('click', () => {
            profilePanel.style.display = 'none';
        });

        function updateProfileUI() {
            profileName.textContent = playerName;
            currentScoreSpan.textContent = score;
            totalClicksSpan.textContent = totalClicks;
            joinDateSpan.textContent = joinDate;
            if (avatarBase64) {
                profileAvatar.src = avatarBase64;
            }
        }

        // Смена ника
        changeNameBtn.addEventListener('click', async () => {
            const newName = prompt("Новый ник:", playerName);
            if (!newName) return;
            const snap = await get(ref(db, 'users/' + newName));
            if (snap.exists()) { 
                nameError.style.display = 'block';
                setTimeout(() => nameError.style.display = 'none', 2000);
                return; 
            }
            
            const oldProfileRef = ref(db, 'users/' + playerName);
            const oldSnap = await get(oldProfileRef);
            const oldData = oldSnap.val() || {};
            
            await set(ref(db, 'users/' + newName), oldData);
            await remove(oldProfileRef);
            
            playerName = newName;
            localStorage.setItem('clickerName', playerName);
            setupSync();
            updateProfileUI();
        });

        // Загрузка аватара
        changeAvatarBtn.addEventListener('click', () => {
            avatarFileInput.click();
        });
        avatarFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const size = 128;
                    canvas.width = size;
                    canvas.height = size;
                    ctx.drawImage(img, 0, 0, size, size);
                    const compressed = canvas.toDataURL('image/jpeg', 0.7);
                    avatarBase64 = compressed;
                    profileAvatar.src = compressed;
                    update(ref(db, 'users/' + playerName + '/profile'), { avatar: compressed });
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Синхронизация данных профиля
        function setupSync() {
            const userRef = ref(db, 'users/' + playerName);
            onValue(userRef, (snap) => {
                const data = snap.val() || {};
                score = data.score || 0;
                totalClicks = data.totalClicks || 0;
                joinDate = data.joinDate || new Date().toLocaleDateString();
                avatarBase64 = data.profile?.avatar || '';
                
                countDisplay.innerText = score;
                if (!data.joinDate) {
                    const today = new Date().toLocaleDateString();
                    set(ref(db, 'users/' + playerName), {
                        score: 0,
                        totalClicks: 0,
                        joinDate: today,
                        profile: { avatar: '' }
                    });
                }
                updateProfileUI();
            });
        }

        (async () => {
            if (!playerName) {
                let cand = "Игрок_"+Math.floor(Math.random()*1000);
                while ((await get(ref(db, 'users/' + cand))).exists()) {
                    cand = "Игрок_"+Math.floor(Math.random()*1000);
                }
                playerName = cand;
                localStorage.setItem('clickerName', playerName);
            }
            setupSync();
        })();

        // === КЛИКИ (БЕЗ АНТИЧИТА) ===
        function handleClick(x, y) {
            score++;
            totalClicks++;
            countDisplay.innerText = score;
            const updates = {};
            updates['users/' + playerName + '/score'] = increment(1);
            updates['users/' + playerName + '/totalClicks'] = increment(1);
            update(ref(db), updates).catch(console.warn);
            createParticle(x, y);
        }

        clickBtn.addEventListener('click', (e) => {
            if (e.pointerType === 'touch') return;
            handleClick(e.clientX, e.clientY);
        });
        clickBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            if (t) handleClick(t.clientX, t.clientY);
        }, { passive: false });
        clickBtn.addEventListener('contextmenu', e => e.preventDefault());

        // === ЛИДЕРБОРД (ВСЕ ИГРОКИ) ===
        onValue(ref(db, 'users'), (snap) => {
            const data = snap.val();
            if (!data) { leaderList.innerHTML = '<div class="entry">Пусто</div>'; return; }
            const sorted = Object.entries(data)
                .map(([n, v]) => ({ name: n, score: v.score || 0 }))
                .sort((a,b) => b.score - a.score);
            leaderList.innerHTML = sorted.map(u => 
                `<div class="entry"><span>${escapeHTML(u.name)}</span><b>${u.score}</b></div>`
            ).join('');
        });

        function escapeHTML(s) {
            return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);
        }

        function createParticle(x, y) {
            const p = document.createElement('img');
            p.src = 'https://abrakadabra.fun/uploads/posts/2021-12/1640762606_1-abrakadabra-fun-p-monetka-na-prozrachnom-fone-1.png';
            p.className = 'particle';
            const dx = (Math.random() - 0.5) * 250;
            const dy = (Math.random() - 0.5) * 250 - 50;
            p.style.left = (x - 25) + 'px';
            p.style.top  = (y - 25) + 'px';
            p.style.setProperty('--x', dx + 'px');
            p.style.setProperty('--y', dy + 'px');
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }

        window.makeClick = (e) => { if(e) handleClick(e.clientX, e.clientY); };
    </script>
</body>
</html>
